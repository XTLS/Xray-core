syntax = "proto3";

package xray.proxy.dns;
option csharp_namespace = "Xray.Proxy.Dns";
option go_package = "github.com/xtls/xray-core/proxy/dns";
option java_package = "com.xray.proxy.dns";
option java_multiple_files = true;

import "common/net/destination.proto";
import "common/geodata/geodat.proto";

message Config {
  // Server is the DNS server address. If specified, this address overrides the
  // original one.
  xray.common.net.Endpoint server = 1;

  uint32 user_level = 2;

  bool block_matched = 3;

  bool reject_blocked = 4;

  message QueryRule {
    int32 qtype = 1;
    repeated xray.common.geodata.DomainRule domain = 2;
  }
  repeated QueryRule query_rule = 5;
}
