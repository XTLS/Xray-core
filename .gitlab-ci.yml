stages:
  - sync
  - build

variables:
  # Carrier image (xray binary) under this project's registry -> .../Xray-core/xray
  IMAGE: "$CI_REGISTRY_IMAGE/xray"
  DOCKERFILE: "Dockerfile.ci"

sync_with_upstream:
  stage: sync
  image: docker:stable
  services:
    - docker:dind
  variables:
    GIT_STRATEGY: fetch
  script:
    - apk add --no-cache git openssh-client openssl
    - mkdir -p ~/.ssh; echo "$REPO_SSH_KEY_B64" | openssl base64 -d > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config user.name "github-sync-bot"
    - git config user.email "github-sync-bot@example.com"
    # ensure we have up-to-date origin
    #- git remote set-url origin "$CI_REPOSITORY_URL"
    - git remote set-url origin "git@gitlab.com:${CI_PROJECT_PATH}.git"
    - git fetch origin --prune
    # add upstream (HTTPS using token) and fetch
    - git remote remove upstream || true
    - git remote add upstream "https://${ORIGINAL_REPO:-github.com/XTLS/Xray-core.git}"
    - git fetch upstream --prune
    # update origin main to match upstream/main
    - git checkout -B main origin/main
    - git merge --no-edit upstream/main || { git checkout --ours .gitlab-ci.yml 2>/dev/null || true && git add . && git commit --no-edit; }
    - git push origin main
    # merge updated main into custom branch and push (uses merge; could be using rebase)
    - git fetch origin itentis-main || true
    - git checkout -B itentis-main origin/itentis-main
    - git merge --no-ff --no-edit main || { echo "Merge conflicts; create backup branch and abort"; git branch backup-sync-$(date +%s); exit 1; }
    - git push origin itentis-main
  only:
    - schedules
  allow_failure: false

# Build the patched core into a carrier image holding the xray binary:
#   docker pull registry.gitlab.com/itentis1/siriusvpn/develop/Xray-core/xray:latest
# (The node clones this branch and builds xray itself; this image is for
# distribution / `docker cp` and is independent of the node pipeline.)
build:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_BUILDKIT: "1"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "wireguard-usermanager"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -f "$DOCKERFILE" -t "$IMAGE:$CI_COMMIT_SHORT_SHA" -t "$IMAGE:latest" .
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"

