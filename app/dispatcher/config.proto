syntax = "proto3";

package xray.app.dispatcher;
option csharp_namespace = "Xray.App.Dispatcher";
option go_package = "github.com/xtls/xray-core/app/dispatcher";
option java_package = "com.xray.app.dispatcher";
option java_multiple_files = true;

message SessionConfig {
  reserved 1;
}

message Config {
  SessionConfig settings = 1;
  // Inbound tags for which per-user-per-inbound traffic stat counters are
  // emitted (see Policy.Stats.user_inbound_uplink/downlink). Empty = none.
  // [remnawave-fork] field band 50-99 reserved for fork features; see FORK.md.
  repeated string tracked_inbound_tags = 50;
}
