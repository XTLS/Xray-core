syntax = "proto3";

package xray.app.geodata.command;
option csharp_namespace = "Xray.App.Geodata.Command";
option go_package = "github.com/xtls/xray-core/app/geodata/command";
option java_package = "com.xray.app.geodata.command";
option java_multiple_files = true;

message ReloadGeoIPRequest {}

message ReloadGeoIPResponse {}

message ReloadGeoSiteRequest {}

message ReloadGeoSiteResponse {}

service GeodataService {
  rpc ReloadGeoIP(ReloadGeoIPRequest) returns (ReloadGeoIPResponse) {}
  rpc ReloadGeoSite(ReloadGeoSiteRequest) returns (ReloadGeoSiteResponse) {}
}

message Config {}
