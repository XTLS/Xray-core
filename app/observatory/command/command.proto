syntax = "proto3";

package xray.core.app.observatory.command;
option csharp_namespace = "Xray.Core.App.Observatory.Command";
option go_package = "github.com/xtls/xray-core/app/observatory/command";
option java_package = "com.xray.core.app.observatory.command";
option java_multiple_files = true;

import "app/observatory/config.proto";

message GetOutboundStatusRequest {
  // Empty selects all current observation results.
  repeated string outbound_tags = 1;
}

message GetOutboundStatusResponse {
  xray.core.app.observatory.ObservationResult status = 1;
}

message ProbeOutboundStatusRequest {
  // Empty actively probes all outbounds selected by the observatory config.
  repeated string outbound_tags = 1;
}

message ProbeOutboundStatusResponse {
  xray.core.app.observatory.ObservationResult status = 1;
}

service ObservatoryService {
  rpc GetOutboundStatus(GetOutboundStatusRequest) returns (GetOutboundStatusResponse) {}
  rpc ProbeOutboundStatus(ProbeOutboundStatusRequest) returns (ProbeOutboundStatusResponse) {}
}


message Config {}
