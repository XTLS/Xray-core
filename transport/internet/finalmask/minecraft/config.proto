syntax = "proto3";

package xray.transport.internet.finalmask.minecraft;
option csharp_namespace = "Xray.Transport.Internet.Finalmask.Minecraft";
option go_package = "github.com/xtls/xray-core/transport/internet/finalmask/minecraft";
option java_package = "com.xray.transport.internet.finalmask.minecraft";
option java_multiple_files = true;


message Config {
    repeated bytes short_ids = 1;
    string private_key = 3;

    repeated string usernames = 2;
    bytes short_id = 4;
    string public_key_sha256 = 5;
    string addresss = 6;
    uint32 port = 7;
}