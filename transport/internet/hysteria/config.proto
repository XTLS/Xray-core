syntax = "proto3";

package xray.transport.internet.hysteria;
option csharp_namespace = "Xray.Transport.Internet.Hysteria";
option go_package = "github.com/xtls/xray-core/transport/internet/hysteria";
option java_package = "com.xray.transport.internet.hysteria";
option java_multiple_files = true;

message Config {
  int32 version = 1;
  string auth = 2;
  repeated uint32 ports = 3;
  int64 interval_min = 4;
  int64 interval_max = 5;

  int64 udp_idle_timeout = 6;
  string masq_type = 7;
  string masq_file = 8;
  string masq_url = 9;
  bool masq_url_rewrite_host = 10;
  bool masq_url_insecure = 11;
  string masq_string = 12;
  map<string, string> masq_string_headers = 13;
  int32 masq_string_status_code = 14;
}